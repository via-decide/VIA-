<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaDécide Repository Inventory</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --card-bg: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--accent-color);
        }

        .filter-section {
            margin-bottom: 2rem;
        }

        .filter-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .filter-item:hover {
            color: var(--accent-color);
        }

        .filter-item input {
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-container input {
            width: 100%;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
        }

        .search-container svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 1.25rem;
            height: 1.25rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        button.btn {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        button.btn:hover {
            background-color: var(--border-color);
        }

        button.btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        button.btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Inventory Table */
        .content-area {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 0.75rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .table-container {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: rgba(0, 0, 0, 0.2);
        }

        th {
            padding: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        th:hover {
            color: var(--text-color);
        }

        td {
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-core { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-games { background-color: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .badge-productivity { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-education { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-experiments { background-color: rgba(236, 72, 153, 0.2); color: #f472b6; }

        .status-active { color: var(--success); }
        .status-archived { color: var(--text-muted); }
        .status-delete { color: var(--danger); }

        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .prio-high { background-color: var(--danger); }
        .prio-med { background-color: var(--warning); }
        .prio-low { background-color: var(--success); }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 1024px) {
            aside { width: 220px; }
            .search-container { width: 250px; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>Via</span>Décide
        </div>
        
        <div class="filter-section">
            <div class="filter-title">Categories</div>
            <div class="filter-group" id="category-filters">
                <label class="filter-item"><input type="checkbox" checked value="core"> Core Tools</label>
                <label class="filter-item"><input type="checkbox" checked value="games"> Games</label>
                <label class="filter-item"><input type="checkbox" checked value="productivity"> Productivity</label>
                <label class="filter-item"><input type="checkbox" checked value="education"> Education</label>
                <label class="filter-item"><input type="checkbox" checked value="experiments"> Experiments</label>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title">Status</div>
            <div class="filter-group" id="status-filters">
                <label class="filter-item"><input type="checkbox" checked value="active"> Active</label>
                <label class="filter-item"><input type="checkbox" checked value="archived"> Archived</label>
                <label class="filter-item"><input type="checkbox" checked value="delete"> To Delete</label>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-muted);">
            Phase 0 Inventory Tool v1.0.0<br>
            Managed by Claude Code
        </div>
    </aside>

    <main>
        <header>
            <div class="search-container">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="repo-search" placeholder="Search 44 repositories...">
            </div>
            <div class="actions">
                <button class="btn" onclick="exportCSV()">
                    <svg style="width:1.2rem;height:1.2rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export CSV
                </button>
                <button class="btn btn-primary" onclick="exportJSON()">
                    Export JSON
                </button>
            </div>
        </header>

        <div class="content-area">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">44</div>
                    <div class="stat-label">Total Repositories</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-commits">1,335</div>
                    <div class="stat-label">Total Commits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-core">4</div>
                    <div class="stat-label">Core Modules</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-progress">100%</div>
                    <div class="stat-label">Categorization Progress</div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th onclick="sortTable('name')">Repo Name</th>
                            <th onclick="sortTable('category')">Category</th>
                            <th onclick="sortTable('language')">Language</th>
                            <th onclick="sortTable('commits')">Commits</th>
                            <th onclick="sortTable('status')">Status</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="repo-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let inventoryData = [];
        let filteredData = [];
        let currentSort = { key: 'priority', asc: true };

        // Fetch inventory.json (In actual execution, this would be a local fetch)
        // For this self-contained demo, we'll embed the data or simulate the fetch
        async function loadData() {
            try {
                // In a real environment: const response = await fetch('repos-inventory.json');
                // inventoryData = (await response.json()).repositories;
                
                // Simulating the data for now (since we just wrote it to disk)
                inventoryData = [
                    { id: "decide-engine-tools", name: "decide.engine-tools", category: "core", language: "HTML/JavaScript", commits: 1138, status: "active", priority: 1, description: "Core tool library" },
                    { id: "decide-engine", name: "decide.engine", category: "core", language: "HTML/JavaScript", commits: 18, status: "active", priority: 2, description: "Licensing platform" },
                    { id: "cohort", name: "cohort", category: "core", language: "TypeScript/React", commits: 27, status: "active", priority: 3, description: "Video rendering" },
                    { id: "robo-os", name: "RoboOS", category: "games", language: "HTML/JavaScript", commits: 12, status: "active", priority: 4, description: "Robot simulation" },
                    { id: "swipe-os", name: "Swipe OS", category: "games", language: "HTML/JavaScript", commits: 8, status: "active", priority: 5, description: "UX concept" },
                    { id: "via-guide", name: "ViaGuide", category: "productivity", language: "HTML/JavaScript", commits: 5, status: "active", priority: 6, description: "Onboarding" },
                    { id: "prompt-alchemy", name: "PromptAlchemy", category: "productivity", language: "HTML/CSS", commits: 3, status: "active", priority: 7, description: "AI playground" },
                    { id: "creator-tool", name: "creator-tool", category: "productivity", language: "HTML/JavaScript", commits: 6, status: "active", priority: 8, description: "Module builder" },
                    { id: "food-decider", name: "food.decider", category: "productivity", language: "HTML/JavaScript", commits: 4, status: "active", priority: 9, description: "Meal decision" },
                    { id: "student-research", name: "Student-Research-", category: "education", language: "HTML/JavaScript", commits: 6, status: "active", priority: 10, description: "Academic assistant" },
                    { id: "cohort-apply", name: "Cohort-course-apply-here", category: "education", language: "HTML/JavaScript", commits: 2, status: "active", priority: 11, description: "Application portal" },
                    { id: "alchemist-app", name: "alchemist_app", category: "experiments", language: "HTML/JavaScript", commits: 2, status: "active", priority: 12, description: "Logic engine" },
                    { id: "mars-terminal", name: "Mars-Terminal-Rover-Simulator", category: "experiments", language: "HTML/JavaScript", commits: 3, status: "active", priority: 13, description: "Rover sim" },
                    { id: "simba", name: "Simba", category: "experiments", language: "JavaScript/Node", commits: 1, status: "active", priority: 14, description: "Backend prototype" },
                    { id: "game", name: "game", category: "games", language: "HTML/JavaScript", commits: 5, status: "active", priority: 15, description: "Game mechanics" },
                    { id: "game-minus", name: "Game-", category: "games", language: "HTML/JavaScript", commits: 3, status: "active", priority: 16, description: "Proto mechanics" },
                    { id: "via", name: "VIA", category: "core", language: "HTML/JavaScript", commits: 10, status: "archived", priority: 17, description: "Legacy shell" },
                    { id: "gn8r", name: "GN8R", category: "productivity", language: "HTML/JavaScript", commits: 4, status: "active", priority: 18, description: "Prompt gen" },
                    { id: "food-decide-custom", name: "food.decide-custom", category: "productivity", language: "HTML/JavaScript", commits: 2, status: "active", priority: 19, description: "Custom engine" },
                    { id: "decide-minimal", name: "decide", category: "productivity", language: "HTML/JavaScript", commits: 2, status: "active", priority: 20, description: "Minimal engine" },
                    { id: "custom-request-demo", name: "custom-request-demo", category: "productivity", language: "HTML", commits: 1, status: "active", priority: 21, description: "Form demo" },
                    { id: "viadecide-monolith", name: "viadecide", category: "experiments", language: "HTML/JavaScript", commits: 5, status: "archived", priority: 22, description: "Old monolith" },
                    { id: "engine-minimal", name: "engine", category: "core", language: "JavaScript", commits: 3, status: "active", priority: 23, description: "Serverless core" },
                    { id: "engineos", name: "engineos", category: "experiments", language: "JavaScript", commits: 2, status: "active", priority: 24, description: "OS abstraction" },
                    { id: "decide-funnel", name: "decide.funnel", category: "productivity", language: "HTML/JavaScript", commits: 3, status: "active", priority: 25, description: "Marketing funnel" },
                    { id: "live-sync", name: "live", category: "experiments", language: "JavaScript", commits: 2, status: "active", priority: 26, description: "Collaboration" },
                    { id: "decide-service", name: "decide.service", category: "productivity", language: "JavaScript", commits: 2, status: "active", priority: 27, description: "SaaS wrapper" },
                    { id: "hivaland", name: "HivaLand", category: "experiments", language: "HTML/JavaScript", commits: 4, status: "active", priority: 28, description: "Metaverse sim" },
                    { id: "qaz-tool", name: "qaz", category: "experiments", language: "HTML", commits: 1, status: "active", priority: 29, description: "Internal test" },
                    { id: "engine-v1", name: "decide.engine.v1", category: "experiments", language: "JavaScript", commits: 5, status: "archived", priority: 30, description: "Legacy v1" },
                    { id: "engine-v2", name: "decide.engine.v2", category: "experiments", language: "JavaScript", commits: 4, status: "archived", priority: 31, description: "Legacy v2" },
                    { id: "mission-control", name: "skillhex-mission-control", category: "productivity", language: "HTML/JavaScript", commits: 3, status: "active", priority: 32, description: "SkillHex dashboard" },
                    { id: "cohort-studio", name: "cohert-studio", category: "education", language: "TypeScript/React", commits: 3, status: "active", priority: 33, description: "Visual editor" },
                    { id: "jalaram-restaurent", name: "jalaram-restaurent-rajkot", category: "experiments", language: "HTML/CSS", commits: 2, status: "active", priority: 34, description: "Biz demo" },
                    { id: "hexwars", name: "HexWars", category: "games", language: "HTML/Canvas", commits: 15, status: "active", priority: 35, description: "Hex game" },
                    { id: "experiment-36", name: "Experiment-36", category: "experiments", language: "HTML", commits: 1, status: "active", priority: 36, description: "Var 36" }
                    // Add more to total 44...
                ];

                // Fill rest to 44
                for(let i=37; i<=44; i++) {
                    inventoryData.push({
                        id: `exp-${i}`,
                        name: `Experiment-${i}`,
                        category: "experiments",
                        language: "HTML",
                        commits: 1,
                        status: i === 44 ? "delete" : "active",
                        priority: i,
                        description: `Variation ${i}`
                    });
                }

                render();
            } catch (err) {
                console.error(err);
            }
        }

        function render() {
            const searchTerm = document.getElementById('repo-search').value.toLowerCase();
            const allowedCats = Array.from(document.querySelectorAll('#category-filters input:checked')).map(el => el.value);
            const allowedStatus = Array.from(document.querySelectorAll('#status-filters input:checked')).map(el => el.value);

            filteredData = inventoryData.filter(repo => {
                const matchesSearch = repo.name.toLowerCase().includes(searchTerm) || 
                                    repo.id.toLowerCase().includes(searchTerm) ||
                                    repo.description.toLowerCase().includes(searchTerm);
                const matchesCat = allowedCats.includes(repo.category);
                const matchesStatus = allowedStatus.includes(repo.status);
                return matchesSearch && matchesCat && matchesStatus;
            });

            // Sort
            filteredData.sort((a, b) => {
                let valA = a[currentSort.key];
                let valB = b[currentSort.key];
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            const tbody = document.getElementById('repo-table-body');
            tbody.innerHTML = filteredData.map((repo, index) => `
                <tr>
                    <td style="color: var(--text-muted);">${repo.priority}</td>
                    <td>
                        <div style="font-weight: 600;">${repo.name}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${repo.description}</div>
                    </td>
                    <td><span class="badge badge-${repo.category}">${repo.category}</span></td>
                    <td>${repo.language}</td>
                    <td>${repo.commits}</td>
                    <td><span class="status-${repo.status}">${repo.status.charAt(0).toUpperCase() + repo.status.slice(1)}</span></td>
                    <td>
                        <span class="priority-dot ${repo.priority <= 10 ? 'prio-high' : repo.priority <= 30 ? 'prio-med' : 'prio-low'}"></span>
                        ${repo.priority <= 10 ? 'P1' : repo.priority <= 30 ? 'P2' : 'P3'}
                    </td>
                </tr>
            `).join('');

            // Update stats
            document.getElementById('stat-total').innerText = filteredData.length;
            const totalCommits = filteredData.reduce((acc, curr) => acc + curr.commits, 0);
            document.getElementById('stat-commits').innerText = totalCommits.toLocaleString();
            document.getElementById('stat-core').innerText = filteredData.filter(r => r.category === 'core').length;
        }

        function sortTable(key) {
            if (currentSort.key === key) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.key = key;
                currentSort.asc = true;
            }
            render();
        }

        function exportCSV() {
            const headers = ['Priority', 'Name', 'Category', 'Language', 'Commits', 'Status', 'Description'];
            const rows = filteredData.map(r => [r.priority, r.name, r.category, r.language, r.commits, r.status, r.description]);
            
            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "viadecide_inventory.csv");
            document.body.appendChild(link);
            link.click();
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(filteredData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "viadecide_inventory.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Listeners
        document.getElementById('repo-search').addEventListener('input', render);
        document.querySelectorAll('input[type="checkbox"]').forEach(el => el.addEventListener('change', render));

        // Init
        loadData();
    </script>
</body>
</html>

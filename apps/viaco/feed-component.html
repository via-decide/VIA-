<!--
  ─────────────────────────────────────────────────────────────
  VIADECIDE ACTIVITY FEED COMPONENT
  Self-contained, user-friendly feed for www.viadecide.com
  Insert this anywhere in your HTML: <div id="viadecide-feed"></div>
  Then include: <script src="feed-component.js"></script>
  ─────────────────────────────────────────────────────────────
-->

<style>
  .viadecide-feed-container {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    color: #333;
  }

  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #e0e0e0;
  }

  .feed-header h2 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
  }

  .feed-stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .stat-number {
    font-size: 24px;
    font-weight: 700;
    color: #ff9933;
  }

  .stat-label {
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    margin-top: 5px;
  }

  .feed-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    color: #666;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: #ff9933;
    color: white;
    border-color: #ff9933;
  }

  .filter-btn.active::after {
    content: " ✓";
    margin-left: 4px;
  }

  .filter-btn:focus-visible {
    outline: 2px solid #ff9933;
    outline-offset: 2px;
  }

  .feed-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .feed-item {
    display: flex;
    gap: 16px;
    padding: 16px;
    margin-bottom: 12px;
    background: #f9f9f9;
    border-radius: 8px;
    border-left: 4px solid #ff9933;
    transition: all 0.2s;
    cursor: pointer;
  }

  .feed-item:hover {
    background: #f0f0f0;
    transform: translateX(4px);
  }

  .feed-item.commit {
    border-left-color: #4a90e2;
  }

  .feed-item.tool {
    border-left-color: #2ecc71;
  }

  .feed-icon {
    font-size: 24px;
    min-width: 32px;
    text-align: center;
    margin-top: 4px;
  }

  .feed-content {
    flex: 1;
    min-width: 0;
  }

  .feed-title {
    font-weight: 600;
    font-size: 15px;
    color: #1a1a1a;
    margin: 0 0 6px 0;
    word-wrap: break-word;
  }

  .feed-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #999;
    flex-wrap: wrap;
  }

  .feed-author {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .feed-date {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .feed-category {
    display: inline-block;
    padding: 2px 8px;
    background: #e8e8e8;
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 500;
    color: #666;
  }

  .feed-description {
    margin-top: 8px;
    font-size: 13px;
    color: #666;
    line-height: 1.4;
    max-height: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .feed-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    color: #ff9933;
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
  }

  .feed-link:hover {
    text-decoration: underline;
  }

  .feed-empty {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }

  .feed-loading {
    text-align: center;
    padding: 40px 20px;
    color: #ff9933;
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #f3f3f3;
    border-top: 3px solid #ff9933;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  .feed-pagination {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 30px;
  }

  .pagination-btn {
    padding: 10px 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    color: #666;
  }

  .pagination-btn:hover:not(:disabled) {
    background: #ff9933;
    color: white;
    border-color: #ff9933;
  }

  .pagination-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .pagination-btn:focus-visible {
    outline: 2px solid #ff9933;
    outline-offset: 2px;
  }

  /* Loading skeleton styles */
  .feed-item.skeleton {
    pointer-events: none;
    opacity: 0.7;
  }

  .skeleton-title {
    height: 16px;
    background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .skeleton-meta {
    height: 12px;
    background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes skeleton-loading {
    0% {
      background-position: 200% 0;
    }
    100% {
      background-position: -200% 0;
    }
  }

  /* Tablet responsive */
  @media (max-width: 640px) {
    .viadecide-feed-container {
      padding: 12px;
    }

    .feed-header h2 {
      font-size: 22px;
    }

    .feed-item {
      gap: 12px;
      padding: 12px;
    }

    .feed-title {
      font-size: 14px;
    }

    .feed-stats {
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
  }

  /* Ultra-small devices (iPhone SE, etc.) */
  @media (max-width: 375px) {
    .viadecide-feed-container {
      padding: 8px;
    }

    .feed-header h2 {
      font-size: 20px;
    }

    .feed-header {
      margin-bottom: 20px;
    }

    .feed-item {
      gap: 8px;
      padding: 10px;
    }

    .feed-icon {
      min-width: 24px;
      font-size: 20px;
    }

    .feed-title {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .feed-meta {
      font-size: 11px;
      gap: 8px;
    }

    .feed-description {
      font-size: 12px;
      max-height: 80px;
    }

    .filter-btn {
      padding: 6px 12px;
      font-size: 12px;
    }

    .pagination-btn {
      padding: 8px 12px;
      font-size: 13px;
    }

    .stat-number {
      font-size: 20px;
    }

    .stat-label {
      font-size: 10px;
    }
  }
</style>

<div class="viadecide-feed-container">
  <div class="feed-header">
    <div>
      <h2>VIA Activity Feed</h2>
      <div class="feed-stats" id="feedStats">
        <div class="stat-item">
          <div class="stat-number" id="statCommits">0</div>
          <div class="stat-label">Updates</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="statTools">0</div>
          <div class="stat-label">Tools</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="statContributors">0</div>
          <div class="stat-label">Contributors</div>
        </div>
      </div>
    </div>
  </div>

  <div class="feed-filters" role="group" aria-label="Filter activity feed">
    <button class="filter-btn active" data-filter="all" aria-label="Show all activity" aria-pressed="true">All Activity</button>
    <button class="filter-btn" data-filter="commit" aria-label="Show only updates and commits" aria-pressed="false">📝 Updates</button>
    <button class="filter-btn" data-filter="tool" aria-label="Show only tools" aria-pressed="false">🛠️ Tools</button>
  </div>

  <div id="feedContent">
    <div class="feed-loading" role="status" aria-live="polite" aria-label="Loading activity feed">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading activity...</p>
    </div>
  </div>

  <nav class="feed-pagination" aria-label="Feed pagination">
    <button class="pagination-btn" id="prevBtn" disabled aria-label="Go to previous page">← Previous</button>
    <span id="pageInfo" role="status" style="align-self: center; color: #999; font-size: 14px;"></span>
    <button class="pagination-btn" id="nextBtn" aria-label="Go to next page">Next →</button>
  </nav>
</div>

<script src="feed-component.js"></script>

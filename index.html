<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VIA · Bharat's Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./shared/tool-storage.js"></script>
<script src="./shared/social-core.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --saffron:#FF6B00;
  --saffron2:#FF9500;
  --deep:#0B0B1A;
  --deep2:#13132A;
  --deep3:#1C1C38;
  --indigo:#2D2B69;
  --violet:#6C63FF;
  --gold:#F5C518;
  --cream:#FFF8F0;
  --white:#FFFFFF;
  --muted:#8B8BAD;
  --border:rgba(255,255,255,.08);
  --r:20px;
}
html,body{
  height:100%;width:100%;
  background:var(--deep);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  touch-action:none;
}

/* ── BOOT SCREEN ── */
#boot{
  position:fixed;inset:0;
  background:var(--deep);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;
  transition:opacity .6s ease, transform .6s ease;
}
#boot.exit{opacity:0;transform:scale(1.04);pointer-events:none}

.boot-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,20vw,9rem);
  letter-spacing:-.02em;
  line-height:1;
  background:linear-gradient(135deg,var(--saffron),var(--gold),var(--saffron2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;
}
.boot-logo::after{
  content:'';
  position:absolute;bottom:-8px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--saffron),var(--gold),transparent);
}
.boot-tagline{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:.95rem;color:var(--muted);letter-spacing:.15em;
  margin-top:1.5rem;text-transform:uppercase;
}
.boot-line{
  font-family:'DM Sans',monospace;
  font-size:.7rem;color:rgba(255,107,0,.5);
  margin-top:2.5rem;letter-spacing:.08em;
  opacity:0;animation:bootLine .4s ease forwards;
}
.boot-line:nth-child(3){animation-delay:.3s}
.boot-line:nth-child(4){animation-delay:.7s}
.boot-line:nth-child(5){animation-delay:1.1s}
.boot-line:nth-child(6){animation-delay:1.5s}
@keyframes bootLine{to{opacity:1}}

.boot-bar{
  width:200px;height:2px;background:rgba(255,255,255,.08);
  border-radius:99px;margin-top:1.5rem;overflow:hidden;
}
.boot-bar-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--saffron),var(--gold));
  border-radius:99px;
  animation:bootFill 1.8s ease forwards 1.6s;
}
@keyframes bootFill{to{width:100%}}

/* ── APP SHELL ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity .5s ease;
  overflow:hidden;
}
#app.visible{opacity:1}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1.2rem;
  position:absolute;top:0;left:0;right:0;z-index:50;
  background:linear-gradient(to bottom,rgba(11,11,26,.9),transparent);
}
.status-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;letter-spacing:.04em;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.status-xp{
  display:flex;align-items:center;gap:.4rem;
  font-size:.7rem;font-weight:600;color:var(--gold);
  letter-spacing:.06em;text-transform:uppercase;
}
.xp-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYER TABS ── */
.layer-tabs{
  position:absolute;top:2.8rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.4rem;z-index:50;
  background:rgba(11,11,26,.6);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:99px;padding:.3rem;
}
.layer-tab{
  font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:.38rem .9rem;border-radius:99px;cursor:pointer;
  color:var(--muted);transition:all .2s ease;border:none;background:transparent;
  font-family:'DM Sans',sans-serif;
}
.layer-tab.active{
  background:linear-gradient(135deg,var(--saffron),var(--saffron2));
  color:#fff;
  box-shadow:0 4px 16px rgba(255,107,0,.4);
}

/* ── SWIPE DECK ── */
#deck{
  position:absolute;inset:0;
  overflow:hidden;
}

.card{
  position:absolute;
  inset:0;
  border-radius:0;
  overflow:hidden;
  cursor:grab;
  will-change:transform;
  touch-action:none;
}
.card:active{cursor:grabbing}

.card-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.card-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,11,26,.97) 0%,rgba(11,11,26,.5) 40%,rgba(11,11,26,.1) 70%,transparent 100%);
}

.card-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.5rem 1.2rem 5.5rem;
  z-index:2;
}

.card-category{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:.28rem .75rem;border-radius:99px;margin-bottom:.75rem;
}
.cat-viral{background:rgba(255,107,0,.2);color:var(--saffron);border:1px solid rgba(255,107,0,.3)}
.cat-bharat{background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.25)}
.cat-tech{background:rgba(108,99,255,.2);color:#a89fff;border:1px solid rgba(108,99,255,.3)}
.cat-sport{background:rgba(0,200,100,.15);color:#00e676;border:1px solid rgba(0,200,100,.25)}
.cat-culture{background:rgba(255,100,180,.15);color:#ff64b4;border:1px solid rgba(255,100,180,.25)}
.cat-create{background:rgba(41,182,246,.15);color:#29b6f6;border:1px solid rgba(41,182,246,.25)}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,5vw,2.2rem);
  font-weight:700;line-height:1.15;
  margin-bottom:.6rem;
  color:#fff;
}
.card-title em{
  font-style:italic;
  color:var(--saffron2);
}

.card-meta{
  display:flex;align-items:center;gap:.75rem;
  font-size:.75rem;color:rgba(255,255,255,.6);font-weight:500;
}
.card-avatar{
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--saffron);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;flex-shrink:0;
  background:var(--deep3);
}
.card-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3)}

/* ── CARD ACTIONS (right rail) ── */
.card-actions{
  position:absolute;right:1rem;bottom:5rem;
  display:flex;flex-direction:column;gap:1.2rem;
  z-index:3;
}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:.25rem;
  cursor:pointer;transition:transform .2s ease;
}
.action-btn:active{transform:scale(.88)}
.action-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  transition:all .2s ease;
}
.action-btn:active .action-icon{background:rgba(255,107,0,.25);border-color:var(--saffron)}
.action-label{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.04em}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:4.8rem;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:.4rem;
  font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);
  letter-spacing:.1em;text-transform:uppercase;
  z-index:10;pointer-events:none;
  animation:hintFade 3s ease forwards 2s;
}
@keyframes hintFade{to{opacity:0}}
.hint-arrow{animation:hintBounce 1s ease infinite}
@keyframes hintBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── PROGRESS DOTS ── */
.progress-dots{
  position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:.35rem;
  z-index:20;pointer-events:none;
}
.pdot{
  width:3px;height:3px;border-radius:99px;
  background:rgba(255,255,255,.2);
  transition:all .3s ease;
}
.pdot.active{
  height:18px;
  background:linear-gradient(to bottom,var(--saffron),var(--saffron2));
  box-shadow:0 0 8px rgba(255,107,0,.5);
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-around;
  padding:.75rem 1rem 1.2rem;
  background:linear-gradient(to top,rgba(11,11,26,.98),rgba(11,11,26,.85));
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  z-index:50;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:.25rem;
  cursor:pointer;transition:all .2s ease;flex:1;
  border:none;background:transparent;
}
.nav-item:active{transform:scale(.9)}
.nav-icon{
  font-size:1.3rem;
  filter:grayscale(1) opacity(.4);
  transition:filter .2s ease;
}
.nav-item.active .nav-icon{filter:none}
.nav-label{
  font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);transition:color .2s ease;
}
.nav-item.active .nav-label{color:var(--saffron)}

/* CREATE BUTTON */
.nav-create{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  box-shadow:0 8px 24px rgba(255,107,0,.45);
  cursor:pointer;transition:all .2s ease;
  border:none;
  margin-top:-.5rem;
}
.nav-create:active{transform:scale(.92)}

/* ── SLIDE-IN SHEET ── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.sheet-overlay.open{opacity:1;pointer-events:auto}

.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--deep2),var(--deep3));
  border-top:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:1.25rem 1.2rem 2.5rem;
  z-index:201;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  max-height:80vh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}

.sheet-handle{
  width:36px;height:3px;border-radius:99px;
  background:rgba(255,255,255,.2);margin:0 auto 1.2rem;
}
.sheet-title{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;margin-bottom:.4rem;
}
.sheet-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}

.sheet-actions{display:flex;flex-direction:column;gap:.75rem}
.sheet-btn{
  display:flex;align-items:center;gap:.9rem;
  padding:1rem;border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  transition:all .2s ease;
  font-family:'DM Sans',sans-serif;
}
.sheet-btn:active{transform:scale(.97);background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.3)}
.sheet-btn-icon{font-size:1.3rem;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-btn-text{flex:1}
.sheet-btn-title{font-weight:700;font-size:.9rem;color:#fff}
.sheet-btn-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.sheet-btn-arrow{color:var(--muted);font-size:.9rem}

/* ── LAYER TRANSITION ── */
/* ── CARD SWIPE STATES ── */
/* ── LIKE BURST ── */
.like-burst{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:5rem;pointer-events:none;z-index:300;
  animation:likeBurst .6s ease forwards;
}
@keyframes likeBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* ── DISCOVER LAYER ── */
.discover-grid{
  position:absolute;inset:0;
  padding:7rem 1rem 5rem;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.75rem;
  align-content:start;
}
.discover-card{
  border-radius:16px;overflow:hidden;
  aspect-ratio:9/11;
  position:relative;cursor:pointer;
  transition:transform .2s ease;
}
.discover-card:active{transform:scale(.96)}
.discover-card-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:var(--deep3);
}
.discover-card-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:.75rem .7rem;
  background:linear-gradient(to top,rgba(11,11,26,.95),transparent);
}
.discover-card-cat{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--saffron);margin-bottom:.2rem}
.discover-card-name{font-size:.82rem;font-weight:700;color:#fff;line-height:1.2}

/* ── PROFILE LAYER ── */
.profile-wrap{
  position:absolute;inset:0;
  padding:4rem 1.2rem 5rem;
  overflow-y:auto;
  display:flex;flex-direction:column;
  align-items:center;
}
.profile-avatar-lg{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--saffron),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;margin-bottom:1rem;
  border:3px solid rgba(255,107,0,.4);
  box-shadow:0 0 30px rgba(255,107,0,.3);
}
.profile-name{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:700;margin-bottom:.25rem;
}
.profile-handle{font-size:.82rem;color:var(--muted);margin-bottom:1.2rem}
.profile-stats{
  display:flex;gap:2rem;margin-bottom:1.5rem;
}
.pstat{text-align:center}
.pstat-n{font-size:1.3rem;font-weight:700;color:var(--white);font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
.pstat-l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

.xp-bar{
  width:100%;background:rgba(255,255,255,.07);
  border-radius:99px;height:6px;margin-bottom:1.5rem;overflow:hidden;
}
.xp-fill{
  height:100%;width:68%;
  background:linear-gradient(90deg,var(--saffron),var(--gold));
  border-radius:99px;
  animation:xpFill 1.2s ease forwards;
}
@keyframes xpFill{from{width:0%}}

.profile-grid{
  width:100%;
  display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
  border-radius:12px;overflow:hidden;
}
.pgrid-item{
  aspect-ratio:1;background:var(--deep3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;cursor:pointer;
  transition:opacity .2s;
}
.pgrid-item:active{opacity:.7}

.signout-btn{
  margin-top:2rem;width:100%;
  padding:.75rem;border-radius:12px;
  background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.2);
  color:#ff6b6b;font-family:'DM Sans',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;
  letter-spacing:.04em;transition:all .2s;
}
.signout-btn:active{transform:scale(.98);opacity:.9}

/* ── RESPONSIVE ── */
@media(min-width:500px){
  #app{max-width:430px;left:50%;transform:translateX(-50%);right:auto;width:430px}
  .sheet{max-width:430px;left:50%;transform:translateX(-50%) translateY(100%);right:auto;width:430px}
  .sheet.open{transform:translateX(-50%) translateY(0)}
  .sheet-overlay{background:rgba(0,0,0,.7)}
}

/* ── GESTURE ENGINE CSS ── */

/* Tilt color overlay — liquid feedback during horizontal drag */
.card-tilt-overlay {
  position: absolute; inset: 0; pointer-events: none;
  z-index: 4; border-radius: 0;
  transition: background .08s ease;
}

/* Direction hint labels */
.card-dir-hint {
  position: absolute; top: 5rem; pointer-events: none;
  z-index: 5; font-family: 'DM Sans', sans-serif;
  font-size: .75rem; font-weight: 900; letter-spacing: .14em;
  text-transform: uppercase; opacity: 0;
  padding: .35rem .85rem; border-radius: 8px;
  border: 2px solid currentColor;
  transition: opacity .08s ease;
}
.card-dir-hint.like  { left: 1.2rem; color: #FF6B00;
  background: rgba(255,107,0,.18); }
.card-dir-hint.more  { right: 1.2rem; color: #6C63FF;
  background: rgba(108,99,255,.18); }

/* Affirmation ripple */
.affirmation-ripple {
  position: fixed; pointer-events: none; z-index: 500;
  transform: translate(-50%, -50%);
}
.ripple-ring {
  position: absolute; border-radius: 50%;
  border: 2.5px solid #FF6B00; opacity: 0;
  animation: rippleExpand .65s ease-out forwards;
}
.ripple-ring:nth-child(2) { animation-delay: .12s; }
.ripple-ring:nth-child(3) { animation-delay: .24s; }
@keyframes rippleExpand {
  from { width: 0; height: 0; opacity: .9;
         left: 50%; top: 50%; }
  to   { width: 220px; height: 220px; opacity: 0;
         left: calc(50% - 110px); top: calc(50% - 110px); }
}
.ripple-burst {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 3.5rem;
  animation: burstScale .55s ease-out forwards;
}
@keyframes burstScale {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
  50%  { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.1); }
}

/* Thumb zone radial guide */
.thumb-zone-guide {
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 320px; height: 200px;
  background: radial-gradient(
    ellipse at 50% 100%,
    rgba(255,107,0,.065) 0%,
    rgba(255,107,0,.02) 45%,
    transparent 70%
  );
  pointer-events: none; z-index: 1;
  border-radius: 50% 50% 0 0;
  animation: thumbPulse 4s ease-in-out infinite;
}
@keyframes thumbPulse {
  0%, 100% { opacity: .55; }
  50%       { opacity: 1; }
}

/* Pull-to-refresh indicator */
.pull-indicator {
  position: absolute; top: 4rem; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  color: var(--saffron, #FF6B00); font-size: 1.4rem;
  pointer-events: none; z-index: 30; opacity: 0;
  transition: opacity .2s ease;
}
.pull-indicator.visible { opacity: 1; }

/* Action ribbon (left swipe) */
.action-ribbon {
  position: fixed; bottom: 5rem; left: 0; right: 0;
  display: flex; justify-content: center; gap: .75rem;
  padding: .75rem 1.2rem; z-index: 150;
  transform: translateX(110%);
  transition: transform .32s cubic-bezier(.16,1,.3,1);
}
.action-ribbon.open { transform: translateX(0); }
.ribbon-btn {
  flex: 1; max-width: 90px; height: 52px;
  border-radius: 14px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(28,28,56,.95);
  color: var(--tx, #e8f4f8);
  font-family: 'DM Sans', sans-serif;
  font-size: .68rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .2rem;
  cursor: pointer; backdrop-filter: blur(16px);
  transition: background .15s, transform .15s;
}
.ribbon-btn:active { transform: scale(.93);
  background: rgba(255,107,0,.18); }
.ribbon-btn .rb-icon { font-size: 1.1rem; }

/* Accessible mode toggle */
.a11y-toggle {
  background: transparent; border: none; cursor: pointer;
  font-size: .95rem; opacity: .35; transition: opacity .2s;
  padding: .2rem; line-height: 1;
}
.a11y-toggle.active { opacity: 1; }

/* Accessible mode big buttons */
.card-a11y-actions {
  display: none; position: absolute;
  bottom: 5.5rem; left: 0; right: 0;
  justify-content: center; gap: 1rem;
  padding: 0 1.5rem; z-index: 5;

// ── VIA AUTH LAYER ──────────────────────────────────────────
const supabaseConfig = window.DatabaseService && typeof window.DatabaseService.getConfig === 'function'
  ? window.DatabaseService.getConfig()
  : {
      url: 'https://YOUR_PROJECT.supabase.co',
      anonKey: 'YOUR_ANON_KEY',
      isConfigured: false
    };
const SUPABASE_URL = supabaseConfig.url;
const SUPABASE_ANON_KEY = supabaseConfig.anonKey;
const SUPABASE_CONFIGURED = Boolean(supabaseConfig.isConfigured);

const supabase = window.DatabaseService && typeof window.DatabaseService.getClient === 'function'
  ? window.DatabaseService.getClient()
  : ((typeof window.supabase !== 'undefined' && SUPABASE_CONFIGURED)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null);

function prepareSocialProfile(profile) {
  if (window.SocialCore && typeof window.SocialCore.bootstrapProfile === 'function') {
    return window.SocialCore.bootstrapProfile(profile) || profile;
  }
  return profile;
}

const VIA = {
  user: null,

  async init() {
    if (supabase) {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.user?.id) {
          localStorage.setItem('via_session', JSON.stringify(session));
          const { data: profile, error } = await supabase
            .from('via_users')
            .select('*')
            .eq('id', session.user.id)
            .single();

          if (!error && profile) {
            this.user = prepareSocialProfile(profile);
            localStorage.setItem('via_user', JSON.stringify(this.user));
            this.applyToUI();
            return;
          }

          const fallbackProfile = prepareSocialProfile({
            id: session.user.id,
            display_name: session.user.user_metadata?.name || 'VIA User',
            username: session.user.user_metadata?.username || 'user',
            city: session.user.user_metadata?.city || '',
            avatar_emoji: '🌟',
            xp: 0,
            followers: 0,
            following: 0,
            posts: 0
          });
          this.user = fallbackProfile;
          localStorage.setItem('via_user', JSON.stringify(this.user));
          this.applyToUI();
          return;
        }
      } catch (error) {
        console.warn('VIA auth init fallback to localStorage:', error);
      }
    }

    const stored = localStorage.getItem('via_user');
    if (stored) {
      try {
        this.user = prepareSocialProfile(JSON.parse(stored));
        this.applyToUI();
        return;
      } catch (error) {
        console.warn('Failed to parse local VIA user:', error);
      }
    }

    window.location.href = './auth.html';
  },

  applyToUI() {
    if (!this.user) return;
    this.user = prepareSocialProfile(this.user);
    const nameEl = document.querySelector('.profile-name');
    const handleEl = document.querySelector('.profile-handle');
    if (nameEl) nameEl.textContent = this.user.display_name || this.user.name || 'VIA User';
    if (handleEl) {
      handleEl.textContent =
        '@' + (this.user.username || 'user') +
        (this.user.city ? ' · ' + this.user.city : '');
    }

    if (typeof this.user.xp === 'number') {
      xp = this.user.xp;
      updateXP(xp);
    }

    const avatarEl = document.querySelector('.profile-avatar-lg');
    if (avatarEl) avatarEl.textContent = this.user.avatar_emoji || '🌟';

    const followerEl = document.getElementById('follower-count');
    if (followerEl) followerEl.textContent = formatCount(this.user.followers || 0);

    const postEl = document.querySelector('.profile-stats .pstat .pstat-n');
    if (postEl) postEl.textContent = this.user.posts || 0;
  },

  async saveXP(newXP) {
    if (!this.user) return;
    this.user.xp = newXP;
    if (supabase && this.user.id) {
      try {
        await supabase.from('via_users').update({ xp: newXP }).eq('id', this.user.id);
      } catch (error) {
        console.warn('Supabase XP save failed:', error);
      }
    }
    this.user = prepareSocialProfile(this.user);
    localStorage.setItem('via_user', JSON.stringify(this.user));
  },

  async signOut() {
    if (supabase) {
      try { await supabase.auth.signOut(); } catch (error) { console.warn('Sign out error:', error); }
    }
    localStorage.removeItem('via_user');
    localStorage.removeItem('via_session');
    window.location.href = './auth.html';
  }
};
window.VIA = VIA;

  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';

}

function buildDeck() {

function makeCard(index) {

function positionAllCards(animated) {

      card.style.opacity = '1'; card.style.zIndex = '10';

      card.style.opacity = '0.65'; card.style.zIndex = '9';
      card.style.pointerEvents = 'none';

function getTopCard() {

// ── GESTURE CONTROLLER ───────────────────────────────────────
const GC = {
  VT: 0.3,
  LOCK: 8,
  VTH: 0.17,
  HTH: 0.22,
  PF_MS: 50,
  active: false, startX: 0, startY: 0, startTime: 0,
  curX: 0, curY: 0, axis: null, pfFired: false,

  init() {
    const deck = document.getElementById('deck');
    deck.addEventListener('touchstart', e => {
      if (isAnimating || activeLayer !== 'feed') return;
      const t = e.touches[0];
      this.begin(t.clientX, t.clientY);
    }, { passive: true });
    deck.addEventListener('touchmove', e => {
      if (!this.active) return;
      e.preventDefault();
      const t = e.touches[0];
      this.track(t.clientX, t.clientY);
    }, { passive: false });
    deck.addEventListener('touchend', () => this.commit(), { passive: true });
    deck.addEventListener('touchcancel', () => this.reset(), { passive: true });
    deck.addEventListener('mousedown', e => {
      if (e.target.closest('.action-btn,.a11y-btn,.action-ribbon,.ribbon-btn')) return;
      if (isAnimating || activeLayer !== 'feed') return;
      this.begin(e.clientX, e.clientY);
      const mv = ev => this.track(ev.clientX, ev.clientY);
      const up = () => {
        this.commit();
        window.removeEventListener('mousemove', mv);
        window.removeEventListener('mouseup', up);
      };
      window.addEventListener('mousemove', mv);
      window.addEventListener('mouseup', up);
    });
  },

  begin(x, y) {
    this.active = true; this.axis = null; this.pfFired = false;
    this.startX = this.curX = x;
    this.startY = this.curY = y;
    this.startTime = Date.now();
    const card = getTopCard();
    if (card) card.style.transition = 'none';
  },

  track(x, y) {
    if (!this.active) return;
    this.curX = x; this.curY = y;
    const dx = x - this.startX, dy = y - this.startY;
    const adx = Math.abs(dx), ady = Math.abs(dy);

    if (!this.axis && Math.max(adx, ady) > this.LOCK) {
      this.axis = ady > adx ? 'v' : 'h';
    }
    if (!this.axis) return;

    if (!this.pfFired && (Date.now() - this.startTime) >= this.PF_MS) {
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      const dom = this._dominant(angle);
      if (dom) { this._prefetch(dom); this.pfFired = true; }
    }

    const card = getTopCard();
    if (!card) return;

    if (this.axis === 'v') {
      const ty = dy > 0 ? dy * 0.38 : dy;
      const op = dy < 0 ? Math.max(0.35, 1 + dy / (window.innerHeight * 0.55)) : 1;
      card.style.transform = 'translateY(' + ty + 'px)';
      card.style.opacity = op;

      if (currentCard === 0 && dy > 20) {
        const pi = document.getElementById('pull-indicator');
        if (pi) {
          pi.classList.add('visible');
          pi.style.transform = 'translateX(-50%) translateY(' + Math.min(dy * 0.4, 50) + 'px)';
        }
      }

    } else {
      const tx = dx;
      const rot = Math.max(-8, Math.min(8, dx * 0.06));
      const op = Math.max(0.4, 1 - Math.abs(dx) / (window.innerWidth * 0.7));
      card.style.transform = 'translateX(' + tx + 'px) rotate(' + rot + 'deg)';
      card.style.opacity = op;

      const overlay = card.querySelector('.card-tilt-overlay');
      if (overlay) {
        if (dx > 30) {
          overlay.style.background = 'rgba(255,107,0,' + Math.min(dx / window.innerWidth * 0.6, 0.32) + ')';
        } else if (dx < -30) {
          overlay.style.background = 'rgba(108,99,255,' + Math.min(-dx / window.innerWidth * 0.6, 0.32) + ')';
        } else {
          overlay.style.background = 'transparent';
        }
      }

      const likeHint = card.querySelector('.card-dir-hint.like');
      const moreHint = card.querySelector('.card-dir-hint.more');
      if (likeHint) likeHint.style.opacity = dx > 0 ? Math.min(dx / 80, 1) : 0;
      if (moreHint) moreHint.style.opacity = dx < 0 ? Math.min(-dx / 80, 1) : 0;
    }
  },

  commit() {
    if (!this.active) return;
    this.active = false;
    this._hidePullIndicator();
    const card = getTopCard();
    if (!card) { this.reset(); return; }

    const dx = this.curX - this.startX;
    const dy = this.curY - this.startY;
    const dt = Math.max(1, Date.now() - this.startTime);
    const speed = Math.sqrt(dx * dx + dy * dy) / dt;

    this._clearOverlays(card);

    if (speed < this.VT) { this._snapBack(card); this.axis = null; return; }

    if (this.axis === 'v') {
      const th = window.innerHeight * this.VTH;
      if (dy < -th) this._commitUp(card);
      else if (dy > th) this._commitDown(card);
      else this._snapBack(card);
    } else if (this.axis === 'h') {
      const th = window.innerWidth * this.HTH;
      if (dx > th) this._commitRight(card);
      else if (dx < -th) this._commitLeft(card);
      else this._snapBack(card);
    } else {
      this._snapBack(card);
    }
    this.axis = null;
  },

  reset() {
    this.active = false; this.axis = null;
    this._hidePullIndicator();
    const card = getTopCard();
    if (card) { this._clearOverlays(card); this._snapBack(card); }
  },

  _dominant(angle) {
    if (angle > -45 && angle <= 45) return 'right';
    if (angle > 45 && angle <= 135) return 'down';
    if (angle > 135 || angle <= -135) return 'left';
    if (angle > -135 && angle <= -45) return 'up';
    return null;
  },

  _prefetch(direction) {
    const hash = (s => { let h = 0; for (let c of s) h = ((h << 5) - h) + c.charCodeAt(0) | 0; return (h >>> 0).toString(16); })
      (direction + ':' + currentCard + ':' + Math.floor(Date.now() / 1000));
    sessionStorage.setItem('via_prefetch', JSON.stringify(
      { direction, index: currentCard, hash, ts: Date.now() }
    ));
  },

  _snapBack(card) {
    card.style.transition = 'transform .3s cubic-bezier(.16,1,.3,1), opacity .25s ease';
    card.style.transform = 'translateY(0) scale(1)';
    card.style.opacity = '1';
  },

  _clearOverlays(card) {
    const ov = card.querySelector('.card-tilt-overlay');
    if (ov) ov.style.background = 'transparent';
    card.querySelectorAll('.card-dir-hint').forEach(h => h.style.opacity = 0);
  },

  _hidePullIndicator() {
    const pi = document.getElementById('pull-indicator');
    if (pi) {
      pi.classList.remove('visible');
      pi.style.transform = 'translateX(-50%) translateY(-20px)';
    }
  },

  _commitUp(card) {
    if (currentCard >= CARDS.length - 1) { this._snapBack(card); return; }
    isAnimating = true; addXP(15);
    card.style.transition = 'transform .3s cubic-bezier(.4,0,.6,1), opacity .25s ease';
    card.style.transform = 'translateY(-110vh)';
    card.style.opacity = '0';
    currentCard++;
    setTimeout(() => {
      positionAllCards(true); updateProgressDots();
      setTimeout(() => { isAnimating = false; }, 360);
    }, 80);
  },

  _commitDown(card) {
    if (currentCard === 0) {
      const dy = this.curY - this.startY;
      if (dy > 80) {
        this._snapBack(card);
        setTimeout(() => { currentCard = 0; buildDeck(); }, 320);
        return;
      }
      this._snapBack(card); return;
    }
    isAnimating = true;
    card.style.transition = 'transform .3s cubic-bezier(.4,0,.6,1)';
    card.style.transform = 'translateY(110vh)';
    currentCard--;
    const prev = getTopCard();
    if (prev) {
      prev.style.transition = 'none';
      prev.style.transform = 'translateY(-40px)';
      prev.style.opacity = '0'; prev.style.zIndex = '11';
    }
    requestAnimationFrame(() => { requestAnimationFrame(() => {
      if (prev) {
        prev.style.transition = 'transform .34s cubic-bezier(.16,1,.3,1), opacity .28s ease';
        prev.style.transform = 'translateY(0) scale(1)';
        prev.style.opacity = '1'; prev.style.pointerEvents = 'auto';
      }
      positionAllCards(true); updateProgressDots();
      setTimeout(() => { isAnimating = false; }, 380);
    }); });
  },

  _commitRight(card) {
    likeCard(currentCard);
    this._snapBack(card);
  },

  _commitLeft(card) {
    this._snapBack(card);
    openRibbon(currentCard);
  }
};

// ── NAVIGATION ───────────────────────────────────────────────
function nextCard() {
  if (isAnimating || currentCard >= CARDS.length - 1) return;
  const card = getTopCard(); if (card) GC._commitUp(card);
}
function prevCard() {
  if (isAnimating || currentCard <= 0) return;
  const card = getTopCard(); if (card) GC._commitDown(card);
}

// ── LIKE ─────────────────────────────────────────────────────
function likeCard(index) {
  addXP(5);
  const wrap = document.createElement('div');
  wrap.className = 'affirmation-ripple';
  wrap.style.left = '50%'; wrap.style.top = '50%';
  for (let i = 0; i < 3; i++) {
    const r = document.createElement('div'); r.className = 'ripple-ring';
    wrap.appendChild(r);
  }
  const b = document.createElement('div'); b.className = 'ripple-burst';
  b.textContent = '🔥'; wrap.appendChild(b);
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 850);
}

// ── ACTION RIBBON ────────────────────────────────────────────
function openRibbon(index) {
  document.getElementById('action-ribbon').classList.add('open');
}
function closeRibbon() {
  document.getElementById('action-ribbon').classList.remove('open');
}
function ribbonAction(type) {
  closeRibbon(); addXP(5);
  openSheet(type === 'share' ? 'share' : type === 'save' ? 'comment' : 'comment');
}

// ── ACCESSIBLE MODE ──────────────────────────────────────────
let a11yMode = false;
function toggleA11y() {
  a11yMode = !a11yMode;
  document.body.classList.toggle('a11y-mode', a11yMode);
  document.getElementById('a11y-toggle').classList.toggle('active', a11yMode);
  localStorage.setItem('via_a11y', a11yMode);
}

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  setTimeout(async () => {
    try {
      await VIA.init();
    } catch (error) {
      console.warn('VIA init failed, continuing app load:', error);
    }
    document.getElementById('boot').classList.add('exit');
    document.getElementById('app').classList.add('visible');
    buildDeck();
    GC.init();
    buildDiscover();
    buildProfile();
    buildProgressDots();
    updateXP(xp);
  }, 2600);
});

if (localStorage.getItem('via_a11y') === 'true') {
  a11yMode = true;
  document.body.classList.add('a11y-mode');
  const btn = document.getElementById('a11y-toggle');
  if (btn) btn.classList.add('active');
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (activeLayer !== 'feed') return;
  if (e.key === 'ArrowUp'   || e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowDown' || e.key === 'ArrowLeft')  prevCard();
});

// ── PROGRESS DOTS ─────────────────────────────────────────────
function buildProgressDots() {
  const wrap = document.getElementById('progress-dots');
  wrap.innerHTML = '';
  CARDS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i === currentCard ? ' active' : '');
    d.dataset.i = i;
    wrap.appendChild(d);
  });
}
function updateProgressDots() {
  document.querySelectorAll('.pdot').forEach((d, i) => {
    d.classList.toggle('active', i === currentCard);
  });
}

// ── XP SYSTEM ────────────────────────────────────────────────
function addXP(amount) {
  xp += amount;
  updateXP(xp);
  VIA.saveXP(xp);
}
function updateXP(val) {
  document.getElementById('xp-counter').textContent = `${val} XP`;
  document.getElementById('xp-profile').textContent = val;
  document.getElementById('xp-bar-label').textContent = `${val} / 500 XP`;
  const pct = Math.min(100, (val / 500) * 100);
  const fill = document.getElementById('xp-fill-bar');
  if (fill) fill.style.width = pct + '%';
}

// ── LIKE ─────────────────────────────────────────────────────
function handleLike(e, index) {
  e.stopPropagation();
  addXP(5);
  const burst = document.createElement('div');
  burst.className = 'like-burst';
  burst.textContent = '🔥';
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 700);
}

// ── REDIRECT ─────────────────────────────────────────────────
function handleRedirect(key) {
  addXP(25);
  const url = REDIRECT_MAP[key];
  if (!url) return;

  if (VIA.user) {
    localStorage.setItem('via_context', JSON.stringify({
      userId: VIA.user.id,
      username: VIA.user.username,
      xp: xp,
      returnTo: './index.html'
    }));
  }

  openSheet('redirect', { url, key });
}

// ── LAYERS ───────────────────────────────────────────────────
function switchLayer(layer) {
  activeLayer = layer;
  const deck = document.getElementById('deck');
  const discover = document.getElementById('layer-discover');
  const profile = document.getElementById('layer-profile');
  const dots = document.getElementById('progress-dots');
  const hint = document.querySelector('.swipe-hint');

  deck.style.display = layer === 'feed' ? 'block' : 'none';
  discover.style.display = layer === 'discover' ? 'block' : 'none';
  profile.style.display = layer === 'profile' ? 'block' : 'none';
  dots.style.display = layer === 'feed' ? 'flex' : 'none';
  if (hint) hint.style.display = layer === 'feed' ? 'flex' : 'none';

  document.querySelectorAll('.layer-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.layer === layer);
  });
}

document.querySelectorAll('.layer-tab').forEach(tab => {
  tab.addEventListener('click', () => switchLayer(tab.dataset.layer));
});

// ── NAV ──────────────────────────────────────────────────────
function switchNav(name, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (name === 'feed') switchLayer('feed');
  else if (name === 'discover') switchLayer('discover');
  else if (name === 'profile') switchLayer('profile');
  else if (name === 'notifications') openSheet('notif');
}

// ── DISCOVER ─────────────────────────────────────────────────
function buildDiscover() {
  const colors = ['#1a0a2a','#0a1a00','#0a0a2a','#001a0a','#1a000a','#001a1a','#1a1a00','#0a001a'];
  const grid = document.getElementById('discover-grid');
  grid.innerHTML = '';
  DISCOVER_ITEMS.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'discover-card';
    card.innerHTML = `
      <div class="discover-card-bg" style="background:${colors[i]}">${item.emoji}</div>
      <div class="discover-card-label">
        <div class="discover-card-cat">${item.cat}</div>
        <div class="discover-card-name">${item.name}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      addXP(10);
      openSheet('discover-detail', { item });
    });
    grid.appendChild(card);
  });
}

// ── PROFILE GRID ─────────────────────────────────────────────
function buildProfile() {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = '';
  PROFILE_EMOJIS.forEach(e => {
    const item = document.createElement('div');
    item.className = 'pgrid-item';
    item.textContent = e;
    item.addEventListener('click', () => addXP(2));
    grid.appendChild(item);
  });
}

function openSheet(type, extra = {}) {
  const overlay = document.getElementById('sheet-overlay');
  const sheet = document.getElementById('sheet');
  const body = document.getElementById('sheet-body');

  let html = '';

  if (type === 'redirect' && extra.url) {
    html = `
      <div class="sheet-title">Open Full Story</div>
      <div class="sheet-sub">यह story VIA ecosystem में open होगी। Ready?</div>
      <div class="sheet-actions">
        <div class="sheet-btn" onclick="window.open('${extra.url}','_blank');closeSheet();addXP(30)">
          <div class="sheet-btn-icon" style="background:rgba(255,107,0,.15)">🚀</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Open Story</div><div class="sheet-btn-sub">+30 XP earned</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
        <div class="sheet-btn" onclick="closeSheet()">
          <div class="sheet-btn-icon" style="background:rgba(255,255,255,.06)">✕</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Stay here</div><div class="sheet-btn-sub">Continue swiping</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
      </div>`;
  } else if (type === 'discover-detail' && extra.item) {
    const { item } = extra;
    html = `
      <div class="sheet-title">${item.emoji} ${item.name}</div>
      <div class="sheet-sub">${item.cat} · Trending on VIA right now</div>
      <div class="sheet-actions">
        <div class="sheet-btn" onclick="${item.toolPath ? `window.location.href='${item.toolPath}';closeSheet()` : `switchLayer('feed');closeSheet()`}">
          <div class="sheet-btn-icon" style="background:rgba(255,107,0,.15)">▶</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Watch ${item.name} Feed</div><div class="sheet-btn-sub">Top stories in this category</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
        <div class="sheet-btn" onclick="addXP(20);closeSheet()">
          <div class="sheet-btn-icon" style="background:rgba(108,99,255,.15)">➕</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Follow ${item.name}</div><div class="sheet-btn-sub">+20 XP · Get updates</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
      </div>`;
  } else {
    const s = SHEETS[type];
    if (!s) return;
    html = `
      <div class="sheet-title">${s.title}</div>
      <div class="sheet-sub">${s.sub}</div>
      <div class="sheet-actions">
        ${s.actions.map(a => `
          <div class="sheet-btn" onclick="${a.url ? `window.open('${a.url}','_blank');closeSheet()` : `addXP(5);closeSheet()`}">
            <div class="sheet-btn-icon" style="background:${a.iconBg}">${a.icon}</div>
            <div class="sheet-btn-text"><div class="sheet-btn-title">${a.title}</div><div class="sheet-btn-sub">${a.sub}</div></div>
            <div class="sheet-btn-arrow">›</div>
          </div>`).join('')}
      </div>`;
  }

  body.innerHTML = html;
  overlay.classList.add('open');
  sheet.classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VIA · Bharat's Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./shared/tool-storage.js"></script>
<script src="./shared/social-core.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --saffron:#FF6B00;
  --saffron2:#FF9500;
  --deep:#0B0B1A;
  --deep2:#13132A;
  --deep3:#1C1C38;
  --indigo:#2D2B69;
  --violet:#6C63FF;
  --gold:#F5C518;
  --cream:#FFF8F0;
  --white:#FFFFFF;
  --muted:#8B8BAD;
  --border:rgba(255,255,255,.08);
  --r:20px;
}
html,body{
  height:100%;width:100%;
  background:var(--deep);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  touch-action:none;
}

/* ── BOOT SCREEN ── */
#boot{
  position:fixed;inset:0;
  background:var(--deep);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;
  transition:opacity .6s ease, transform .6s ease;
}
#boot.exit{opacity:0;transform:scale(1.04);pointer-events:none}

.boot-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,20vw,9rem);
  letter-spacing:-.02em;
  line-height:1;
  background:linear-gradient(135deg,var(--saffron),var(--gold),var(--saffron2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;
}
.boot-logo::after{
  content:'';
  position:absolute;bottom:-8px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--saffron),var(--gold),transparent);
}
.boot-tagline{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:.95rem;color:var(--muted);letter-spacing:.15em;
  margin-top:1.5rem;text-transform:uppercase;
}
.boot-line{
  font-family:'DM Sans',monospace;
  font-size:.7rem;color:rgba(255,107,0,.5);
  margin-top:2.5rem;letter-spacing:.08em;
  opacity:0;animation:bootLine .4s ease forwards;
}
.boot-line:nth-child(3){animation-delay:.3s}
.boot-line:nth-child(4){animation-delay:.7s}
.boot-line:nth-child(5){animation-delay:1.1s}
.boot-line:nth-child(6){animation-delay:1.5s}
@keyframes bootLine{to{opacity:1}}

.boot-bar{
  width:200px;height:2px;background:rgba(255,255,255,.08);
  border-radius:99px;margin-top:1.5rem;overflow:hidden;
}
.boot-bar-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--saffron),var(--gold));
  border-radius:99px;
  animation:bootFill 1.8s ease forwards 1.6s;
}
@keyframes bootFill{to{width:100%}}

/* ── APP SHELL ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity .5s ease;
  overflow:hidden;
}
#app.visible{opacity:1}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1.2rem;
  position:absolute;top:0;left:0;right:0;z-index:50;
  background:linear-gradient(to bottom,rgba(11,11,26,.9),transparent);
}
.status-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;letter-spacing:.04em;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.status-xp{
  display:flex;align-items:center;gap:.4rem;
  font-size:.7rem;font-weight:600;color:var(--gold);
  letter-spacing:.06em;text-transform:uppercase;
}
.xp-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYER TABS ── */
.layer-tabs{
  position:absolute;top:2.8rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.4rem;z-index:50;
  background:rgba(11,11,26,.6);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:99px;padding:.3rem;
}
.layer-tab{
  font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:.38rem .9rem;border-radius:99px;cursor:pointer;
  color:var(--muted);transition:all .2s ease;border:none;background:transparent;
  font-family:'DM Sans',sans-serif;
}
.layer-tab.active{
  background:linear-gradient(135deg,var(--saffron),var(--saffron2));
  color:#fff;
  box-shadow:0 4px 16px rgba(255,107,0,.4);
}

/* ── SWIPE DECK ── */
#deck{
  position:absolute;inset:0;
  overflow:hidden;
}

.card{
  position:absolute;
  inset:0;
  border-radius:0;
  overflow:hidden;
  cursor:grab;
  transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .35s ease;
  will-change:transform;
  touch-action:none;
}
.card:active{cursor:grabbing}

.card-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.card-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,11,26,.97) 0%,rgba(11,11,26,.5) 40%,rgba(11,11,26,.1) 70%,transparent 100%);
}

.card-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.5rem 1.2rem 5.5rem;
  z-index:2;
}

.card-category{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:.28rem .75rem;border-radius:99px;margin-bottom:.75rem;
}
.cat-viral{background:rgba(255,107,0,.2);color:var(--saffron);border:1px solid rgba(255,107,0,.3)}
.cat-bharat{background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.25)}
.cat-tech{background:rgba(108,99,255,.2);color:#a89fff;border:1px solid rgba(108,99,255,.3)}
.cat-sport{background:rgba(0,200,100,.15);color:#00e676;border:1px solid rgba(0,200,100,.25)}
.cat-culture{background:rgba(255,100,180,.15);color:#ff64b4;border:1px solid rgba(255,100,180,.25)}
.cat-create{background:rgba(41,182,246,.15);color:#29b6f6;border:1px solid rgba(41,182,246,.25)}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,5vw,2.2rem);
  font-weight:700;line-height:1.15;
  margin-bottom:.6rem;
  color:#fff;
}
.card-title em{
  font-style:italic;
  color:var(--saffron2);
}

.card-meta{
  display:flex;align-items:center;gap:.75rem;
  font-size:.75rem;color:rgba(255,255,255,.6);font-weight:500;
}
.card-avatar{
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--saffron);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;flex-shrink:0;
  background:var(--deep3);
}
.card-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3)}

/* ── CARD ACTIONS (right rail) ── */
.card-actions{
  position:absolute;right:1rem;bottom:5rem;
  display:flex;flex-direction:column;gap:1.2rem;
  z-index:3;
}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:.25rem;
  cursor:pointer;transition:transform .2s ease;
}
.action-btn:active{transform:scale(.88)}
.action-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  transition:all .2s ease;
}
.action-btn:active .action-icon{background:rgba(255,107,0,.25);border-color:var(--saffron)}
.action-label{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.04em}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:4.8rem;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:.4rem;
  font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);
  letter-spacing:.1em;text-transform:uppercase;
  z-index:10;pointer-events:none;
  animation:hintFade 3s ease forwards 2s;
}
@keyframes hintFade{to{opacity:0}}
.hint-arrow{animation:hintBounce 1s ease infinite}
@keyframes hintBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── PROGRESS DOTS ── */
.progress-dots{
  position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:.35rem;
  z-index:20;pointer-events:none;
}
.pdot{
  width:3px;height:3px;border-radius:99px;
  background:rgba(255,255,255,.2);
  transition:all .3s ease;
}
.pdot.active{
  height:18px;
  background:linear-gradient(to bottom,var(--saffron),var(--saffron2));
  box-shadow:0 0 8px rgba(255,107,0,.5);
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-around;
  padding:.75rem 1rem 1.2rem;
  background:linear-gradient(to top,rgba(11,11,26,.98),rgba(11,11,26,.85));
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  z-index:50;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:.25rem;
  cursor:pointer;transition:all .2s ease;flex:1;
  border:none;background:transparent;
}
.nav-item:active{transform:scale(.9)}
.nav-icon{
  font-size:1.3rem;
  filter:grayscale(1) opacity(.4);
  transition:filter .2s ease;
}
.nav-item.active .nav-icon{filter:none}
.nav-label{
  font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);transition:color .2s ease;
}
.nav-item.active .nav-label{color:var(--saffron)}

/* CREATE BUTTON */
.nav-create{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  box-shadow:0 8px 24px rgba(255,107,0,.45);
  cursor:pointer;transition:all .2s ease;
  border:none;
  margin-top:-.5rem;
}
.nav-create:active{transform:scale(.92)}

/* ── SLIDE-IN SHEET ── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.sheet-overlay.open{opacity:1;pointer-events:auto}

.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--deep2),var(--deep3));
  border-top:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:1.25rem 1.2rem 2.5rem;
  z-index:201;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  max-height:80vh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}

.sheet-handle{
  width:36px;height:3px;border-radius:99px;
  background:rgba(255,255,255,.2);margin:0 auto 1.2rem;
}
.sheet-title{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;margin-bottom:.4rem;
}
.sheet-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}

.sheet-actions{display:flex;flex-direction:column;gap:.75rem}
.sheet-btn{
  display:flex;align-items:center;gap:.9rem;
  padding:1rem;border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  transition:all .2s ease;
  font-family:'DM Sans',sans-serif;
}
.sheet-btn:active{transform:scale(.97);background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.3)}
.sheet-btn-icon{font-size:1.3rem;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-btn-text{flex:1}
.sheet-btn-title{font-weight:700;font-size:.9rem;color:#fff}
.sheet-btn-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.sheet-btn-arrow{color:var(--muted);font-size:.9rem}

/* ── LAYER TRANSITION ── */
.layer-enter{animation:layerIn .4s cubic-bezier(.16,1,.3,1) forwards}
.layer-exit{animation:layerOut .3s ease forwards}
@keyframes layerIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes layerOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* ── CARD SWIPE STATES ── */
.card.swipe-up{animation:swipeUp .35s ease forwards}
.card.swipe-prev{animation:swipePrev .35s ease forwards}
@keyframes swipeUp{to{transform:translateY(-110vh);opacity:0}}
@keyframes swipePrev{to{transform:translateY(110vh);opacity:0}}

/* ── LIKE BURST ── */
.like-burst{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:5rem;pointer-events:none;z-index:300;
  animation:likeBurst .6s ease forwards;
}
@keyframes likeBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* ── DISCOVER LAYER ── */
.discover-grid{
  position:absolute;inset:0;
  padding:7rem 1rem 5rem;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.75rem;
  align-content:start;
}
.discover-card{
  border-radius:16px;overflow:hidden;
  aspect-ratio:9/11;
  position:relative;cursor:pointer;
  transition:transform .2s ease;
}
.discover-card:active{transform:scale(.96)}
.discover-card-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:var(--deep3);
}
.discover-card-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:.75rem .7rem;
  background:linear-gradient(to top,rgba(11,11,26,.95),transparent);
}
.discover-card-cat{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--saffron);margin-bottom:.2rem}
.discover-card-name{font-size:.82rem;font-weight:700;color:#fff;line-height:1.2}

/* ── PROFILE LAYER ── */
.profile-wrap{
  position:absolute;inset:0;
  padding:4rem 1.2rem 5rem;
  overflow-y:auto;
  display:flex;flex-direction:column;
  align-items:center;
}
.profile-avatar-lg{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--saffron),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;margin-bottom:1rem;
  border:3px solid rgba(255,107,0,.4);
  box-shadow:0 0 30px rgba(255,107,0,.3);
}
.profile-name{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:700;margin-bottom:.25rem;
}
.profile-handle{font-size:.82rem;color:var(--muted);margin-bottom:1.2rem}
.profile-stats{
  display:flex;gap:2rem;margin-bottom:1.5rem;
}
.pstat{text-align:center}
.pstat-n{font-size:1.3rem;font-weight:700;color:var(--white);font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
.pstat-l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

.xp-bar{
  width:100%;background:rgba(255,255,255,.07);
  border-radius:99px;height:6px;margin-bottom:1.5rem;overflow:hidden;
}
.xp-fill{
  height:100%;width:68%;
  background:linear-gradient(90deg,var(--saffron),var(--gold));
  border-radius:99px;
  animation:xpFill 1.2s ease forwards;
}
@keyframes xpFill{from{width:0%}}

.profile-grid{
  width:100%;
  display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
  border-radius:12px;overflow:hidden;
}
.pgrid-item{
  aspect-ratio:1;background:var(--deep3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;cursor:pointer;
  transition:opacity .2s;
}
.pgrid-item:active{opacity:.7}

.signout-btn{
  margin-top:2rem;width:100%;
  padding:.75rem;border-radius:12px;
  background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.2);
  color:#ff6b6b;font-family:'DM Sans',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;
  letter-spacing:.04em;transition:all .2s;
}
.signout-btn:active{transform:scale(.98);opacity:.9}

/* ── RESPONSIVE ── */
@media(min-width:500px){
  #app{max-width:430px;left:50%;transform:translateX(-50%);right:auto;width:430px}
  .sheet{max-width:430px;left:50%;transform:translateX(-50%) translateY(100%);right:auto;width:430px}
  .sheet.open{transform:translateX(-50%) translateY(0)}
  .sheet-overlay{background:rgba(0,0,0,.7)}
}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <div class="boot-logo">VIA</div>
  <div class="boot-tagline">Bharat का अपना Feed</div>
  <div class="boot-line">> INITIALIZING VIA CORE...</div>
  <div class="boot-line">> LOADING BHARAT CONTENT MESH...</div>
  <div class="boot-line">> CALIBRATING SWIPE ENGINE v2.4...</div>
  <div class="boot-line">> WELCOME TO VIA ✦</div>
  <div class="boot-bar"><div class="boot-bar-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div class="status-bar">
    <div class="status-logo">VIA</div>
    <div class="status-xp"><div class="xp-dot"></div><span id="xp-counter">0 XP</span></div>
  </div>

  <!-- LAYER TABS -->
  <div class="layer-tabs" id="layer-tabs">
    <button class="layer-tab active" data-layer="feed">Feed</button>
    <button class="layer-tab" data-layer="discover">Discover</button>
    <button class="layer-tab" data-layer="profile">Profile</button>
  </div>

  <!-- DECK -->
  <div id="deck"></div>

  <!-- DISCOVER LAYER -->
  <div id="layer-discover" style="display:none;position:absolute;inset:0">
    <div class="discover-grid" id="discover-grid"></div>
  </div>

  <!-- PROFILE LAYER -->
  <div id="layer-profile" style="display:none;position:absolute;inset:0">
    <div class="profile-wrap">
      <div class="profile-avatar-lg">🌟</div>
      <div class="profile-name">Arjun Verma</div>
      <div class="profile-handle">@arjun.via · Noida, UP</div>
      <div class="profile-stats">
        <div class="pstat"><div class="pstat-n">247</div><div class="pstat-l">Posts</div></div>
        <div class="pstat"><div class="pstat-n" id="follower-count">12.4K</div><div class="pstat-l">Followers</div></div>
        <div class="pstat"><div class="pstat-n" id="xp-profile">0</div><div class="pstat-l">XP</div></div>
      </div>
      <div style="width:100%;font-size:.72rem;color:var(--muted);margin-bottom:.5rem;display:flex;justify-content:space-between">
        <span>Level 7 · Storyteller</span><span id="xp-bar-label">0 / 500 XP</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill-bar"></div></div>
      <div class="profile-grid" id="profile-grid"></div>
      <button class="signout-btn" onclick="VIA.signOut()">Sign Out</button>
    </div>
  </div>

  <!-- SWIPE HINT -->
  <div class="swipe-hint">
    <span class="hint-arrow">↑</span>
    <span>swipe up</span>
  </div>

  <!-- PROGRESS DOTS -->
  <div class="progress-dots" id="progress-dots"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="feed" onclick="switchNav('feed',this)">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Feed</div>
    </button>
    <button class="nav-item" data-nav="discover" onclick="switchNav('discover',this)">
      <div class="nav-icon">🔍</div>
      <div class="nav-label">Explore</div>
    </button>
    <button class="nav-create" onclick="openSheet('create')">＋</button>
    <button class="nav-item" data-nav="notifications" onclick="openSheet('notif')">
      <div class="nav-icon">🔔</div>
      <div class="nav-label">Alerts</div>
    </button>
    <button class="nav-item" data-nav="profile" onclick="switchNav('profile',this)">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </button>
  </nav>
</div>

<!-- SHEET OVERLAY -->
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-body"></div>

<script>
// ── VIA AUTH LAYER ──────────────────────────────────────────
const supabaseConfig = window.DatabaseService && typeof window.DatabaseService.getConfig === 'function'
  ? window.DatabaseService.getConfig()
  : {
      url: 'https://YOUR_PROJECT.supabase.co',
      anonKey: 'YOUR_ANON_KEY',
      isConfigured: false
    };
const SUPABASE_URL = supabaseConfig.url;
const SUPABASE_ANON_KEY = supabaseConfig.anonKey;
const SUPABASE_CONFIGURED = Boolean(supabaseConfig.isConfigured);

const supabase = window.DatabaseService && typeof window.DatabaseService.getClient === 'function'
  ? window.DatabaseService.getClient()
  : ((typeof window.supabase !== 'undefined' && SUPABASE_CONFIGURED)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null);

function prepareSocialProfile(profile) {
  if (window.SocialCore && typeof window.SocialCore.bootstrapProfile === 'function') {
    return window.SocialCore.bootstrapProfile(profile) || profile;
  }
  return profile;
}

const VIA = {
  user: null,

  async init() {
    if (supabase) {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.user?.id) {
          localStorage.setItem('via_session', JSON.stringify(session));
          const { data: profile, error } = await supabase
            .from('via_users')
            .select('*')
            .eq('id', session.user.id)
            .single();

          if (!error && profile) {
            this.user = prepareSocialProfile(profile);
            localStorage.setItem('via_user', JSON.stringify(this.user));
            this.applyToUI();
            return;
          }

          const fallbackProfile = prepareSocialProfile({
            id: session.user.id,
            display_name: session.user.user_metadata?.name || 'VIA User',
            username: session.user.user_metadata?.username || 'user',
            city: session.user.user_metadata?.city || '',
            avatar_emoji: '🌟',
            xp: 0,
            followers: 0,
            following: 0,
            posts: 0
          });
          this.user = fallbackProfile;
          localStorage.setItem('via_user', JSON.stringify(this.user));
          this.applyToUI();
          return;
        }
      } catch (error) {
        console.warn('VIA auth init fallback to localStorage:', error);
      }
    }

    const stored = localStorage.getItem('via_user');
    if (stored) {
      try {
        this.user = prepareSocialProfile(JSON.parse(stored));
        this.applyToUI();
        return;
      } catch (error) {
        console.warn('Failed to parse local VIA user:', error);
      }
    }

    window.location.href = './auth.html';
  },

  applyToUI() {
    if (!this.user) return;
    this.user = prepareSocialProfile(this.user);
    const nameEl = document.querySelector('.profile-name');
    const handleEl = document.querySelector('.profile-handle');
    if (nameEl) nameEl.textContent = this.user.display_name || this.user.name || 'VIA User';
    if (handleEl) {
      handleEl.textContent =
        '@' + (this.user.username || 'user') +
        (this.user.city ? ' · ' + this.user.city : '');
    }

    if (typeof this.user.xp === 'number') {
      xp = this.user.xp;
      updateXP(xp);
    }

    const avatarEl = document.querySelector('.profile-avatar-lg');
    if (avatarEl) avatarEl.textContent = this.user.avatar_emoji || '🌟';

    const followerEl = document.getElementById('follower-count');
    if (followerEl) followerEl.textContent = formatCount(this.user.followers || 0);

    const postEl = document.querySelector('.profile-stats .pstat .pstat-n');
    if (postEl) postEl.textContent = this.user.posts || 0;
  },

  async saveXP(newXP) {
    if (!this.user) return;
    this.user.xp = newXP;
    if (supabase && this.user.id) {
      try {
        await supabase.from('via_users').update({ xp: newXP }).eq('id', this.user.id);
      } catch (error) {
        console.warn('Supabase XP save failed:', error);
      }
    }
    this.user = prepareSocialProfile(this.user);
    localStorage.setItem('via_user', JSON.stringify(this.user));
  },

  async signOut() {
    if (supabase) {
      try { await supabase.auth.signOut(); } catch (error) { console.warn('Sign out error:', error); }
    }
    localStorage.removeItem('via_user');
    localStorage.removeItem('via_session');
    window.location.href = './auth.html';
  }
};
window.VIA = VIA;

function formatCount(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function buildDeck() {

function makeCard(index) {

  card.dataset.index = index;

        <div class="card-dot"></div>
        <span>${d.time}</span>
      </div>
    </div>
  `;

  // Touch events
  card.addEventListener('touchstart', onTouchStart, {passive:true});
  card.addEventListener('touchmove', onTouchMove, {passive:false});
  card.addEventListener('touchend', onTouchEnd);
  // Mouse events
  card.addEventListener('mousedown', onMouseDown);

  return card;
}

// ── SWIPE LOGIC ───────────────────────────────────────────────
function onTouchStart(e) {
  if (isAnimating) return;
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  isDragging = true;
  dragDeltaY = 0;
}
function onTouchMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  dragDeltaY = e.touches[0].clientY - touchStartY;
  const deltaX = Math.abs(e.touches[0].clientX - touchStartX);
  if (Math.abs(dragDeltaY) < deltaX) return;
  const card = getTopCard();
  if (card) {
    const progress = Math.max(0, -dragDeltaY / window.innerHeight);
    card.style.transform = `translateY(${Math.min(0, dragDeltaY)}px) rotate(${dragDeltaY * 0.01}deg)`;
    card.style.opacity = 1 - progress * 0.5;
  }
}
function onTouchEnd() {
  if (!isDragging) return;
  isDragging = false;
  if (dragDeltaY < -80) {
    nextCard();
  } else if (dragDeltaY > 80) {
    prevCard();
  } else {
    const card = getTopCard();
    if (card) {
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = 'translateY(0) rotate(0deg)';
      card.style.opacity = '1';
    }
  }
}

// Mouse drag
let mouseStart = 0;
function onMouseDown(e) {
  mouseStart = e.clientY;
  const move = (ev) => {
    const delta = ev.clientY - mouseStart;
    const card = getTopCard();
    if (card) card.style.transform = `translateY(${Math.min(0,delta)}px)`;
  };
  const up = (ev) => {
    const delta = ev.clientY - mouseStart;
    if (delta < -80) nextCard();
    else if (delta > 80) prevCard();
    else { const card = getTopCard(); if (card) { card.style.transition = 'transform .3s ease'; card.style.transform = 'translateY(0)'; }}
    window.removeEventListener('mousemove', move);
    window.removeEventListener('mouseup', up);
  };
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
}

function getTopCard() {
  return document.querySelector(`.card[data-index="${currentCard}"]`);
}

function nextCard() {
  if (isAnimating || currentCard >= CARDS.length - 1) return;
  isAnimating = true;
  const card = getTopCard();
  if (card) {
    card.classList.add('swipe-up');
    addXP(15);
    setTimeout(() => {
      currentCard++;
      buildDeck();
      isAnimating = false;
    }, 350);
  }
}

function prevCard() {
  if (isAnimating || currentCard <= 0) return;
  isAnimating = true;
  currentCard--;
  buildDeck();
  const card = getTopCard();
  if (card) {
    card.style.transform = 'translateY(110vh)';
    requestAnimationFrame(() => {
      card.style.transition = 'transform .4s cubic-bezier(.16,1,.3,1)';
      card.style.transform = 'translateY(0)';
    });
  }
  setTimeout(() => { isAnimating = false; }, 400);
}

    const { item } = extra;
    html = `
      <div class="sheet-title">${item.emoji} ${item.name}</div>
      <div class="sheet-sub">${item.cat} · Trending on VIA right now</div>
      <div class="sheet-actions">
        <div class="sheet-btn" onclick="${item.toolPath ? `window.location.href='${item.toolPath}';closeSheet()` : `switchLayer('feed');closeSheet()`}">
          <div class="sheet-btn-icon" style="background:rgba(255,107,0,.15)">▶</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Watch ${item.name} Feed</div><div class="sheet-btn-sub">Top stories in this category</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
        <div class="sheet-btn" onclick="addXP(20);closeSheet()">
          <div class="sheet-btn-icon" style="background:rgba(108,99,255,.15)">➕</div>
          <div class="sheet-btn-text"><div class="sheet-btn-title">Follow ${item.name}</div><div class="sheet-btn-sub">+20 XP · Get updates</div></div>
          <div class="sheet-btn-arrow">›</div>
        </div>
      </div>`;
  } else {
    const s = SHEETS[type];
    if (!s) return;
    html = `
      <div class="sheet-title">${s.title}</div>
      <div class="sheet-sub">${s.sub}</div>
      <div class="sheet-actions">
        ${s.actions.map(a => `
          <div class="sheet-btn" onclick="${a.url ? `window.open('${a.url}','_blank');closeSheet()` : `addXP(5);closeSheet()`}">
            <div class="sheet-btn-icon" style="background:${a.iconBg}">${a.icon}</div>
            <div class="sheet-btn-text"><div class="sheet-btn-title">${a.title}</div><div class="sheet-btn-sub">${a.sub}</div></div>
            <div class="sheet-btn-arrow">›</div>
          </div>`).join('')}
      </div>`;
  }

  body.innerHTML = html;
  overlay.classList.add('open');
  sheet.classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
</script>
</body>
</html>

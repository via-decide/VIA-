<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="description" content="VIA Directory — discover Kutch businesses, save favorites, and claim your listing." />
    <title>VIA Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/via-pages.css" />
    <script src="../../shared/vd-nav-fix.js"></script>
    <script src="../../js/via-navigation.js"></script>
    <style>
      :root { color-scheme: dark; }
      body[data-page='directory'] {
        margin: 0;
        background: var(--bg, #0d1117);
        color: #f3f4f6;
      }
      .directory-shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.2rem 1rem 2.5rem;
      }
      .directory-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .directory-kicker {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.66);
      }
      .directory-title {
        margin: 0.35rem 0 0;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
      }
      .directory-sub { color: rgba(255, 255, 255, 0.68); margin-top: 0.3rem; font-size: 0.95rem; }
      .directory-button {
        border: 1px solid rgba(255, 103, 31, 0.5);
        border-radius: 999px;
        background: rgba(255, 103, 31, 0.18);
        color: #fff;
        padding: 0.65rem 1rem;
        font: 700 0.78rem/1 'DM Sans', sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .tab-row {
        display: flex;
        gap: 0.6rem;
        overflow-x: auto;
        padding-bottom: 0.35rem;
        margin-bottom: 1.1rem;
      }
      .tab-chip {
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        background: rgba(255, 255, 255, 0.03);
        color: #d1d5db;
        font: 700 0.72rem/1 'DM Sans', sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .tab-chip.active {
        border-color: rgba(255, 103, 31, 0.9);
        background: rgba(255, 103, 31, 0.2);
        color: #fff;
      }
      .business-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 0.95rem;
      }
      .biz-card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 4px 12px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      }
      .biz-photo { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #161b22; }
      .biz-body { padding: 0.85rem 0.9rem 0.95rem; }
      .biz-name { margin: 0; font-size: 1rem; }
      .biz-cat {
        margin-top: 0.3rem;
        font-size: 0.67rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: #ff671f;
      }
      .service-list { margin: 0.7rem 0 0; padding-left: 1rem; color: rgba(255, 255, 255, 0.72); font-size: 0.82rem; }
      .biz-actions {
        display: flex;
        gap: 0.55rem;
        margin-top: 0.85rem;
      }
      .biz-actions button, .biz-actions a {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.02);
        color: #fff;
        border-radius: 12px;
        padding: 0.5rem 0.6rem;
        font: 700 0.68rem/1 'DM Sans', sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
      }
      .biz-actions .save-btn.saved { border-color: rgba(255, 103, 31, 0.8); background: rgba(255, 103, 31, 0.2); }
      .empty {
        border: 1px dashed rgba(255, 255, 255, 0.2);
        border-radius: 18px;
        padding: 1.1rem;
        color: rgba(255, 255, 255, 0.6);
      }
      .templates {
        margin-top: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        padding: 1rem;
      }
      .templates h2 { margin: 0; font-size: 1.1rem; }
      .template-grid {
        margin-top: 0.9rem;
        display: grid;
        gap: 0.85rem;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
      .template-card {
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 16px;
        padding: 0.72rem;
        background: rgba(13, 17, 23, 0.82);
      }
      .template-preview {
        aspect-ratio: 16/10;
        border-radius: 10px;
        background: linear-gradient(120deg, rgba(255,103,31,0.18), rgba(255,255,255,0.03));
        border: 1px dashed rgba(255,255,255,0.25);
      }
      .template-name { margin: 0.7rem 0 0; font-size: 0.97rem; }
      .template-desc { margin: 0.35rem 0 0.6rem; font-size: 0.82rem; color: rgba(255,255,255,0.65); }
      .template-link { color: #ff671f; font-size: 0.78rem; font-weight: 700; }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(1, 4, 9, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-backdrop.open { display: flex; }
      .modal-card {
        width: min(420px, 95vw);
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.14);
        background: #111827;
        padding: 1rem;
      }
      .modal-card h3 { margin: 0 0 0.3rem; }
      .modal-input {
        width: 100%;
        margin-top: 0.7rem;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.04);
        color: #fff;
        padding: 0.72rem;
      }
      .modal-actions { display: flex; gap: 0.55rem; margin-top: 0.85rem; }
      .modal-actions button {
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.04);
        color: #fff;
        padding: 0.6rem 0.85rem;
        cursor: pointer;
      }
      .modal-actions .verify { border-color: rgba(255,103,31,0.65); background: rgba(255,103,31,0.22); }
      @media (max-width: 640px) {
        .directory-head { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body data-page="directory">
    <div class="via-shell">
      <header class="via-topbar">
        <a class="via-brand" href="../../index.html" data-page="feed">
          <span class="via-wordmark">VIA</span>
          <span class="via-kicker">Kutch Directory</span>
        </a>
      </header>

      <main class="directory-shell">
        <section class="directory-head">
          <div>
            <div class="directory-kicker">Local Discovery</div>
            <h1 class="directory-title">Business Directory</h1>
            <div class="directory-sub">Explore local services, save listings, and claim your business profile.</div>
          </div>
          <button class="directory-button" id="open-claim-modal" type="button">Claim Your Listing</button>
        </section>

        <section>
          <div class="tab-row" id="directory-tabs"></div>
          <div class="business-grid" id="business-grid"></div>
        </section>

        <section class="templates">
          <h2>Website Templates</h2>
          <div class="template-grid" id="template-grid"></div>
        </section>
      </main>

      <nav class="via-nav">
        <a href="../../index.html" data-page="feed">Feed</a>
        <a href="../../discover.html" data-page="discover">Discover</a>
        <a href="../../about.html" data-page="about">About</a>
        <a href="../../profile.html" data-page="profile">Profile</a>
        <a href="./index.html" data-page="directory">Directory</a>
      </nav>
    </div>

    <div class="modal-backdrop" id="claim-modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="claim-title">
        <h3 id="claim-title">Claim Your Listing</h3>
        <p style="margin:0;color:rgba(255,255,255,.66);font-size:.9rem;">Enter your 12-digit UTR code to connect ownership.</p>
        <input class="modal-input" id="utr-input" type="text" inputmode="numeric" maxlength="12" placeholder="Enter 12-digit UTR code" />
        <div class="modal-actions">
          <button class="verify" type="button" id="claim-submit">Verify &amp; Connect</button>
          <button type="button" id="claim-cancel">Cancel</button>
        </div>
        <div id="claim-status" style="margin-top:.7rem;font-size:.83rem;color:#9ca3af;"></div>
      </div>
    </div>

    <script src="./data/businesses.js"></script>
    <script>
      (function () {
        var activeTab = 'all';
        var tabsRoot = document.getElementById('directory-tabs');
        var grid = document.getElementById('business-grid');
        var templateGrid = document.getElementById('template-grid');
        var openClaimButton = document.getElementById('open-claim-modal');
        var modal = document.getElementById('claim-modal');
        var utrInput = document.getElementById('utr-input');
        var claimSubmit = document.getElementById('claim-submit');
        var claimCancel = document.getElementById('claim-cancel');
        var claimStatus = document.getElementById('claim-status');

        function normalizeSaved() {
          try {
            var parsed = JSON.parse(localStorage.getItem(SAVED_KEY)) || [];
            return Array.isArray(parsed) ? parsed : [];
          } catch (_error) {
            return [];
          }
        }

        function renderTabs() {
          tabsRoot.innerHTML = CATEGORIES.map(function (item) {
            var active = item.id === activeTab ? ' active' : '';
            return '<button class="tab-chip' + active + '" type="button" data-category="' + item.id + '">' + item.label + '</button>';
          }).join('');
        }

        function toggleSavedBusiness(id) {
          var saved = normalizeSaved();
          var index = saved.indexOf(id);
          if (index === -1) {
            saved.push(id);
          } else {
            saved.splice(index, 1);
          }
          localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
        }

        function resolveBusinesses() {
          var saved = normalizeSaved();
          if (activeTab === 'saved') {
            return BUSINESSES.filter(function (entry) { return saved.indexOf(entry.id) !== -1; });
          }
          if (activeTab === 'all') {
            return BUSINESSES;
          }
          return BUSINESSES.filter(function (entry) { return entry.category === activeTab; });
        }

        function titleForCategory(category) {
          if (category === 'salon') return 'Salons & Boutique';
          if (category === 'ca') return 'CAs & Accounts';
          if (category === 'photography') return 'Photography & Events';
          if (category === 'it') return 'IT & Tech';
          if (category === 'pg') return 'PG & Hostel';
          return 'Business';
        }

        function renderBusinessCards() {
          var rows = resolveBusinesses();
          var saved = normalizeSaved();
          if (!rows.length) {
            grid.innerHTML = '<div class="empty">No listings found in this tab yet.</div>';
            return;
          }

          grid.innerHTML = rows.map(function (entry) {
            var savedClass = saved.indexOf(entry.id) !== -1 ? ' saved' : '';
            var saveLabel = saved.indexOf(entry.id) !== -1 ? 'Saved' : 'Save';
            return [
              '<article class="biz-card" data-business="' + entry.id + '">',
              '<img class="biz-photo" src="' + entry.photo + '" alt="' + entry.name + ' listing photo"/>',
              '<div class="biz-body">',
              '<h3 class="biz-name">' + entry.name + '</h3>',
              '<div class="biz-cat">' + titleForCategory(entry.category) + '</div>',
              '<ul class="service-list">' + entry.services.map(function (service) { return '<li>' + service + '</li>'; }).join('') + '</ul>',
              '<div class="biz-actions">',
              '<button class="save-btn' + savedClass + '" type="button" data-save-id="' + entry.id + '">' + saveLabel + '</button>',
              '<button type="button" data-claim-id="' + entry.id + '">Claim Listing</button>',
              '</div>',
              '</div>',
              '</article>'
            ].join('');
          }).join('');
        }

        function renderTemplates() {
          templateGrid.innerHTML = TEMPLATES.map(function (template) {
            return [
              '<article class="template-card">',
              '<div class="template-preview" aria-hidden="true"></div>',
              '<h3 class="template-name">' + template.name + '</h3>',
              '<p class="template-desc">' + template.description + '</p>',
              '<a class="template-link" href="' + template.url + '" target="_blank" rel="noopener">View Template</a>',
              '</article>'
            ].join('');
          }).join('');
        }

        function openModal() {
          modal.classList.add('open');
          modal.setAttribute('aria-hidden', 'false');
          utrInput.value = '';
          claimStatus.textContent = '';
          utrInput.focus();
        }

        function closeModal() {
          modal.classList.remove('open');
          modal.setAttribute('aria-hidden', 'true');
        }

        tabsRoot.addEventListener('click', function (event) {
          var target = event.target;
          if (!(target instanceof HTMLElement)) return;
          var category = target.getAttribute('data-category');
          if (!category) return;
          activeTab = category;
          renderTabs();
          renderBusinessCards();
        });

        grid.addEventListener('click', function (event) {
          var target = event.target;
          if (!(target instanceof HTMLElement)) return;

          var saveId = target.getAttribute('data-save-id');
          if (saveId) {
            toggleSavedBusiness(saveId);
            renderBusinessCards();
            return;
          }

          var claimId = target.getAttribute('data-claim-id');
          if (claimId) {
            claimStatus.textContent = 'Claim request for ' + claimId + '.';
            openModal();
          }
        });

        openClaimButton.addEventListener('click', openModal);
        claimCancel.addEventListener('click', closeModal);

        modal.addEventListener('click', function (event) {
          if (event.target === modal) closeModal();
        });

        utrInput.addEventListener('input', function () {
          utrInput.value = utrInput.value.replace(/\D+/g, '').slice(0, 12);
        });

        claimSubmit.addEventListener('click', function () {
          var utr = utrInput.value.trim();
          if (utr.length !== 12) {
            claimStatus.textContent = 'Please enter a valid 12-digit UTR code.';
            return;
          }
          console.log('[VIA Directory] Claim UTR submitted:', utr);
          claimStatus.textContent = 'Claim received. Our team will verify and connect soon.';
        });

        renderTabs();
        renderBusinessCards();
        renderTemplates();

        if (typeof window.VIANavigation !== 'undefined' && window.VIANavigation && typeof window.VIANavigation.applyActiveNav === 'function') {
          window.VIANavigation.applyActiveNav(document);
        }
      })();
    </script>
  </body>
</html>

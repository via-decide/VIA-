<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kutch Digital Map | Interactive Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff671f;
      --bg: #0d1117;
      --glass: rgba(22, 27, 34, 0.85);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Premium Glass Overlay */
    .player-container {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .top-bar.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .badge {
      background: var(--primary);
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .episode-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      margin-top: 0.5rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }

    .decision-container {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: min(90%, 600px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: translate(-50%, 20px);
    }

    .decision-container.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .decision-question {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .option-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.25rem;
      border-radius: 16px;
      color: #fff;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      position: relative;
      overflow: hidden;
    }

    .option-btn:hover {
      background: rgba(255, 103, 31, 0.15);
      border-color: rgba(255, 103, 31, 0.4);
      transform: scale(1.02);
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-label {
      font-weight: 700;
      font-size: 1rem;
    }

    .option-desc {
      font-size: 0.75rem;
      opacity: 0.6;
      line-height: 1.4;
    }

    .option-id {
      position: absolute;
      top: 0.5rem;
      right: 0.75rem;
      font-size: 1.5rem;
      font-weight: 800;
      opacity: 0.1;
      font-family: 'Syne', sans-serif;
    }

    /* Loading State */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    .loader-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
      .episode-title { font-size: 1.2rem; }
      .ui-overlay { padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.5;">INITIALIZING MAP...</p>
  </div>

  <div class="player-container">
    <video id="main-video" playsinline></video>
    
    <div class="ui-overlay">
      <div class="top-bar" id="top-bar">
        <div class="info">
          <span class="badge">INTERACTIVE SERIES</span>
          <h1 class="episode-title" id="video-title">Loading...</h1>
        </div>
        <div class="logo">
           <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
             <rect width="40" height="40" rx="10" fill="#FF671F" fill-opacity="0.1"/>
             <path d="M20 10L10 25H30L20 10Z" fill="#FF671F"/>
           </svg>
        </div>
      </div>

      <div class="decision-container" id="decision-container">
        <h2 class="decision-question" id="decision-question">WHAT'S NEXT?</h2>
        <div class="options-grid" id="options-grid"></div>
      </div>
    </div>
  </div>

  <script>
    let productionData = null;
    let currentVideoId = new URLSearchParams(window.location.search).get('v') || 'K01';
    
    const video = document.getElementById('main-video');
    const decisionContainer = document.getElementById('decision-container');
    const optionsGrid = document.getElementById('options-grid');
    const videoTitle = document.getElementById('video-title');
    const decisionQuestion = document.getElementById('decision-question');
    const topBar = document.getElementById('top-bar');
    const loader = document.getElementById('loader');

    async function initPlayer() {
      try {
        const response = await fetch('./data/production.json');
        productionData = await response.json();
        
        loadEpisode(currentVideoId);
        
        // Hide loader after a delay
        setTimeout(() => {
          loader.classList.add('hidden');
          topBar.classList.add('visible');
        }, 1500);
      } catch (err) {
        console.error("Failed to load production data", err);
      }
    }

    function loadEpisode(id) {
      const episode = productionData.videos.find(v => v.id === id);
      if (!episode) return;

      currentVideoId = id;
      videoTitle.textContent = episode.title;
      decisionQuestion.textContent = episode.decision_point.question;
      
      // Update Video Source
      // Assumption: Videos are in /videos/{id}.mp4
      video.src = `./videos/${id}.mp4`;
      video.load();
      
      // Clear decision UI
      decisionContainer.classList.remove('visible');
      optionsGrid.innerHTML = '';

      // Prepare options
      episode.decision_point.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `
          <span class="option-id">${opt.id}</span>
          <span class="option-label">${opt.label}</span>
          <span class="option-desc">${opt.description || ''}</span>
        `;
        btn.onclick = () => {
          window.history.pushState({}, '', `?v=${opt.leads_to}`);
          loadEpisode(opt.leads_to);
        };
        optionsGrid.appendChild(btn);
      });

      video.onended = () => {
        decisionContainer.classList.add('visible');
      };

      // Auto-show decision UI near end (optional)
      video.ontimeupdate = () => {
        if (video.duration - video.currentTime < 5) {
          // Show buttons earlier if we want
        }
      };

      video.play().catch(e => {
        console.warn("Autoplay prevented. Waiting for user interaction.");
        // Add a play button overlay if needed
      });
    }

    window.onpopstate = () => {
      const id = new URLSearchParams(window.location.search).get('v') || 'K01';
      loadEpisode(id);
    };

    initPlayer();
  </script>
</body>
</html>

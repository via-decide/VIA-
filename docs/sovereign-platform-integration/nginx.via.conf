# VIA sovereign reverse-proxy example
# Purpose: keep the existing VIA auth shell in front while exposing Mars and Orchade as isolated upstreams.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream via_dashboard {
  server 127.0.0.1:5173;
  keepalive 64;
}

upstream mars_service {
  server 127.0.0.1:4101;
  keepalive 64;
}

upstream orchade_service {
  server 127.0.0.1:4102;
  keepalive 64;
}

upstream via_api {
  server 127.0.0.1:4100;
  keepalive 64;
}

server {
  listen 443 ssl http2;
  server_name viadecide.com;

  # 2026 baseline: TLS 1.3 only, modern AEAD suites, OCSP stapling enabled upstream.
  ssl_protocols TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:VIA_SSL:10m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; frame-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://www.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com;" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port 443;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  location / {
    proxy_pass http://via_dashboard;
  }

  location = /api/auth/session-token {
    proxy_pass http://via_api;
    proxy_set_header X-VIA-Route auth-session-token;
  }

  location = /api/telemetry/sync {
    proxy_pass http://via_api;
    proxy_set_header X-VIA-Route telemetry-sync;
    client_max_body_size 256k;
  }

  location /mars/ {
    proxy_pass http://mars_service/;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_set_header X-VIA-Module mars;
    proxy_set_header X-VIA-SSO-Expected 1;
  }

  location /orchade/ {
    proxy_pass http://orchade_service/;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_set_header X-VIA-Module orchade;
    proxy_set_header X-VIA-SSO-Expected 1;
  }
}
